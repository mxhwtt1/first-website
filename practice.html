<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice | Hack Your Body: Fact vs Myth</title>
  <meta name="description" content="20 flashcards to test your knowledge. Click each card to reveal the answer." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .flashcard-intro {
      text-align: center;
      color: var(--color-muted);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }
    .flashcard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }
    .card-scene {
      perspective: 900px;
      height: 210px;
    }
    .card-flip {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
      cursor: pointer;
      border-radius: 12px;
    }
    .card-flip.flipped {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
      gap: 8px;
    }
    .card-front {
      background: #1a1a1a;
      border: 2px solid #333;
    }
    .card-front:hover {
      border-color: #0068C4;
    }
    .card-back {
      background: #0c2a4a;
      border: 2px solid #0068C4;
      transform: rotateY(180deg);
    }
    .card-back--myth {
      background: #2a0c0c;
      border-color: #dc2626;
    }
    .card-verdict--myth {
      color: #f87171;
    }
    .card-verdict-label--myth {
      color: #f87171;
    }
    .card-number {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--color-muted);
      text-transform: uppercase;
    }
    .card-icon {
      font-size: 1.8rem;
      line-height: 1;
    }
    .card-label {
      font-size: 0.82rem;
      color: #888;
      font-style: italic;
    }
    .card-topic {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .card-topic--pap { background: rgba(180,100,255,0.18); color: #b464ff; }
    .card-topic--pnf { background: rgba(52,211,153,0.18); color: #34d399; }
    .card-topic--ems { background: rgba(255,160,30,0.18); color: #ffa01e; }
    .card-statement {
      font-size: 0.78rem;
      font-weight: 500;
      color: #e0e0e0;
      line-height: 1.4;
    }
    .card-cite {
      font-size: 0.67rem;
      color: #555;
      font-style: italic;
      line-height: 1.3;
    }
    .card-hint {
      font-size: 0.68rem;
      color: #444;
      margin-top: 2px;
    }
    .card-verdict {
      font-size: 2rem;
      font-weight: 800;
      color: #34d399;
      line-height: 1;
    }
    .card-verdict-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #34d399;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .progress-bar-wrap {
      max-width: 500px;
      margin: 0 auto 28px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--color-muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 6px;
      background: #222;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #0068C4;
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s;
    }
    .reset-btn {
      display: block;
      margin: 0 auto 48px;
      background: transparent;
      border: 2px solid #333;
      color: var(--color-muted);
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .reset-btn:hover {
      border-color: #0068C4;
      color: #f0f0f0;
    }
    .guess-btns {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      width: 100%;
    }
    .guess-btn {
      flex: 1;
      padding: 6px 4px;
      border-radius: 8px;
      border: 2px solid;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      transition: background 0.15s;
    }
    .guess-btn--fact {
      border-color: #34d399;
      color: #34d399;
    }
    .guess-btn--fact:hover { background: rgba(52,211,153,0.15); }
    .guess-btn--myth {
      border-color: #f87171;
      color: #f87171;
    }
    .guess-btn--myth:hover { background: rgba(248,113,113,0.15); }
    .mode-btn {
      background: transparent;
      border: 2px solid #555;
      color: var(--color-muted);
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      margin: 0;
    }
    .mode-btn:hover { border-color: #ffa01e; color: #ffa01e; }
    .mode-btn.active {
      background: rgba(255,160,30,0.12);
      border-color: #ffa01e;
      color: #ffa01e;
    }
    .wrong-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #2a0c0c;
      border: 2px solid #dc2626;
      color: #f87171;
      padding: 18px 36px;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      text-align: center;
    }
    .wrong-flash.show { opacity: 1; }
    @media (max-width: 500px) {
      .flashcard-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .card-scene { height: 185px; }
    }
  </style>
</head>
<body>

  <!-- Desktop header -->
  <header class="site-header">
    <div class="container">
      <button class="back-btn" onclick="history.back()" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </button>
      <a href="index.html" class="logo"><span>Hack</span> Your Body</a>
    </div>
  </header>

  <div class="wrong-flash" id="wrong-flash">✕ Wrong!<br><span style="font-size:0.8rem;font-weight:500;">Progress reset</span></div>

  <!-- Page hero -->
  <section class="page-hero">
    <div class="container">
      <h1>Practice Flashcards</h1>
      <p id="hero-sub">Click each card to flip it and reveal the answer.</p>
    </div>
  </section>

  <main>
    <section class="section">
      <div class="container">

        <div class="progress-bar-wrap">
          <div class="progress-label">
            <span>Cards flipped</span>
            <span id="progress-text">0 / 49</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="flashcard-grid" id="flashcard-grid"></div>

        <div style="display:flex; gap:12px; justify-content:center; margin-bottom:48px; flex-wrap:wrap;">
          <button class="reset-btn" id="reset-btn" style="margin:0;">Reset all cards</button>
          <button class="reset-btn" id="shuffle-btn" style="margin:0; border-color:#0068C4; color:#7DF9FF;">&#8635; Randomise</button>
          <button class="mode-btn" id="mode-btn">&#9654; Test Mode</button>
        </div>

      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-meta">
        <span>Last reviewed: March 2026</span>
        <span>This site does not replace medical advice. Contact your team or GP for individual guidance.</span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    const CARDS = [
      // PAP Facts
      { type: 'fact', text: 'Heavy pre-activation exercises can increase muscular power output', cite: 'Wilson et al., 2013' },
      { type: 'fact', text: 'PAP has less effect on untrained athletes', cite: 'Chiu et al.; Wilson et al., 2013' },
      { type: 'fact', text: 'The optimal rest time for PAP effects is between 4–12 minutes', cite: 'Kilduff et al., 2008; Chen et al., 2023' },
      { type: 'fact', text: 'Training status, intensity, and rest period length influence PAP performance improvements', cite: 'Tillin and Bishop, 2012' },
      { type: 'fact', text: 'PAP increases neural activation of the muscles', cite: 'Blazevich and Babault, 2019' },
      { type: 'fact', text: 'PAP protocols often include high intensity strength exercises of 80% 1RM or more', cite: 'Seitz and Haff, 2015' },
      { type: 'fact', text: 'PAP performance effects depend on the balance between fatigue and potentiation', cite: 'Tillin and Bishop, 2012' },
      // PNF Facts
      { type: 'fact', text: 'PNF stretching performed immediately before exercise may temporarily reduce strength or power performance', cite: 'Behm et al., 2015' },
      { type: 'fact', text: 'One PNF stretching session can significantly increase joint range of motion temporarily', cite: 'Konrad and Tilp, 2014' },
      { type: 'fact', text: 'Flexibility improvements from PNF are partly due to increased tolerance to stretch sensations', cite: 'Magnusson et al., 1996' },
      { type: 'fact', text: 'PNF is widely used in sports training and physiotherapy to improve flexibility and mobility', cite: 'Hindle et al., 2012' },
      { type: 'fact', text: 'PNF stretching works partly because Golgi tendon organs reduce muscle activation', cite: 'Hindle et al., 2012' },
      { type: 'fact', text: 'PNF stretching usually involves contracting the muscle before stretching it further', cite: '' },
      { type: 'fact', text: 'PNF stretching can be performed with both maximal and submaximal muscle contractions', cite: '' },
      // EMS Facts
      { type: 'fact', text: 'External electrical impulses trigger muscle contractions by depolarising motor neurons', cite: 'Milosevic et al., 2020' },
      { type: 'fact', text: 'EMS training can increase muscle strength', cite: 'Maffiuletti and Maffiuletti, 2010' },
      { type: 'fact', text: 'EMS can recruit fast-twitch muscle fibres that are difficult to activate during voluntary exercise', cite: 'Gregory and Bickel, 2005' },
      { type: 'fact', text: 'EMS training can improve strength and power performance in athletes', cite: 'Filipovic et al., 2012' },
      { type: 'fact', text: 'EMS can activate large motor units earlier than voluntary contractions', cite: 'Yoo et al., 2023' },
      { type: 'fact', text: 'EMS mainly stimulates the muscles directly under the electrode pads', cite: '' },
      { type: 'fact', text: 'EMS is often used in rehabilitation to help maintain muscle when someone cannot exercise normally', cite: '' },
      { type: 'fact', text: 'EMS devices send electrical pulses through electrodes placed on the skin', cite: '' },
      // PAP Myths
      { type: 'myth', text: 'PAP works best when the explosive movement is performed immediately after the heavy exercise with no rest', cite: '' },
      { type: 'myth', text: 'PAP improves performance because it increases muscle flexibility like PNF stretching', cite: '' },
      { type: 'myth', text: 'PAP only works for elite power athletes and has no effect in recreational athletes', cite: '' },
      { type: 'myth', text: 'PAP occurs because electrical impulses from the muscles increase in the same way as EMS stimulation', cite: '' },
      { type: 'myth', text: 'The heavier the exercise used in PAP, the bigger the performance improvement will always be', cite: '' },
      { type: 'myth', text: 'PAP improves performance by increasing blood flow to the muscles', cite: '' },
      { type: 'myth', text: 'PAP only improves vertical jump performance and cannot improve sprinting or throwing', cite: '' },
      { type: 'myth', text: 'PAP protocols involve stretching the muscle before explosive activity', cite: '' },
      { type: 'myth', text: 'PAP effects last for more than an hour after the heavy exercise', cite: '' },
      // PNF Myths
      { type: 'myth', text: 'PNF stretching increases explosive power in the same way PAP does', cite: '' },
      { type: 'myth', text: 'PNF stretching works by electrically stimulating the muscle fibres like EMS', cite: '' },
      { type: 'myth', text: 'One PNF stretching session permanently increases muscle length', cite: '' },
      { type: 'myth', text: 'PNF stretching should always involve maximal contractions to be effective', cite: '' },
      { type: 'myth', text: 'PNF stretching improves flexibility mainly by increasing blood flow to the muscle', cite: '' },
      { type: 'myth', text: 'PNF stretching should always be used immediately before explosive activities to increase power', cite: '' },
      { type: 'myth', text: 'PNF stretching only works when assisted by another person and cannot be done independently', cite: '' },
      { type: 'myth', text: 'PNF stretching completely switches off the muscle so it becomes fully relaxed', cite: '' },
      { type: 'myth', text: 'PNF stretching only works for hamstrings and cannot be applied to other muscle groups', cite: '' },
      // EMS Myths
      { type: 'myth', text: 'EMS can fully replace strength training because it stimulates muscles in the same way as voluntary exercise', cite: '' },
      { type: 'myth', text: 'EMS improves flexibility in the same way that PNF stretching does', cite: '' },
      { type: 'myth', text: 'EMS works by increasing the muscle\'s stretch tolerance like PNF stretching', cite: '' },
      { type: 'myth', text: 'EMS only activates slow-twitch muscle fibres', cite: '' },
      { type: 'myth', text: 'EMS produces PAP automatically because electrical stimulation replaces heavy exercise', cite: '' },
      { type: 'myth', text: 'EMS improves strength mainly by increasing blood flow to the muscle', cite: '' },
      { type: 'myth', text: 'EMS contractions occur because the electrodes stretch the muscle fibres', cite: '' },
      { type: 'myth', text: 'EMS only works during rehabilitation and cannot improve athletic performance', cite: '' },
      { type: 'myth', text: 'EMS activates muscles only under the electrodes and does not involve the nervous system', cite: '' },
    ];

    const TOTAL = CARDS.length;
    let flipped = new Set();
    let testMode = false;
    let currentOrder = [];

    function updateProgress() {
      const n = flipped.size;
      document.getElementById('progress-text').textContent = n + ' / ' + TOTAL;
      document.getElementById('progress-fill').style.width = (n / TOTAL * 100) + '%';
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showWrongFlash(cb) {
      const el = document.getElementById('wrong-flash');
      el.classList.add('show');
      setTimeout(() => { el.classList.remove('show'); if (cb) cb(); }, 900);
    }

    function buildCards(order) {
      currentOrder = order;
      const grid = document.getElementById('flashcard-grid');
      grid.innerHTML = '';
      flipped.clear();
      updateProgress();

      for (const idx of order) {
        const c = CARDS[idx];
        const scene = document.createElement('div');
        scene.className = 'card-scene';

        const card = document.createElement('div');
        card.className = 'card-flip';
        const isFact = c.type === 'fact';

        if (testMode) {
          card.setAttribute('aria-label', c.text);
          card.innerHTML = `
            <div class="card-face card-front">
              <span class="card-statement">${c.text}</span>
              <div class="guess-btns">
                <button class="guess-btn guess-btn--fact" aria-label="Fact">✓ Fact</button>
                <button class="guess-btn guess-btn--myth" aria-label="Myth">✕ Myth</button>
              </div>
            </div>
            <div class="card-face card-back ${isFact ? '' : 'card-back--myth'}">
              <span class="card-verdict ${isFact ? '' : 'card-verdict--myth'}">${isFact ? '✓' : '✕'}</span>
              <span class="card-verdict-label ${isFact ? '' : 'card-verdict-label--myth'}">${isFact ? 'True' : 'False'}</span>
              ${c.cite ? `<span class="card-cite">${c.cite}</span>` : ''}
            </div>`;

          function makeGuess(cardEl, i, correct) {
            return function(e) {
              e.stopPropagation();
              if (cardEl.classList.contains('flipped')) return;
              if (correct) {
                cardEl.classList.add('flipped');
                flipped.add(i);
                updateProgress();
              } else {
                showWrongFlash(() => buildCards([...currentOrder]));
              }
            };
          }
          card.querySelector('.guess-btn--fact').addEventListener('click', makeGuess(card, idx, isFact));
          card.querySelector('.guess-btn--myth').addEventListener('click', makeGuess(card, idx, !isFact));

        } else {
          card.setAttribute('role', 'button');
          card.setAttribute('aria-label', c.text + '. Click to flip.');
          card.setAttribute('tabindex', '0');
          card.innerHTML = `
            <div class="card-face card-front">
              <span class="card-statement">${c.text}</span>
              <span class="card-hint">Tap to flip</span>
            </div>
            <div class="card-face card-back ${isFact ? '' : 'card-back--myth'}">
              <span class="card-verdict ${isFact ? '' : 'card-verdict--myth'}">${isFact ? '✓' : '✕'}</span>
              <span class="card-verdict-label ${isFact ? '' : 'card-verdict-label--myth'}">${isFact ? 'True' : 'False'}</span>
              ${c.cite ? `<span class="card-cite">${c.cite}</span>` : ''}
            </div>`;

          function makeToggle(cardEl, i) {
            return function() {
              cardEl.classList.toggle('flipped');
              if (cardEl.classList.contains('flipped')) flipped.add(i);
              else flipped.delete(i);
              updateProgress();
            };
          }
          const toggle = makeToggle(card, idx);
          card.addEventListener('click', toggle);
          card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
        }

        scene.appendChild(card);
        grid.appendChild(scene);
      }
    }

    const defaultOrder = CARDS.map((_, i) => i);
    buildCards([...defaultOrder]);

    document.getElementById('reset-btn').addEventListener('click', () => buildCards([...currentOrder]));
    document.getElementById('shuffle-btn').addEventListener('click', () => buildCards(shuffle([...defaultOrder])));
    document.getElementById('mode-btn').addEventListener('click', () => {
      testMode = !testMode;
      const btn = document.getElementById('mode-btn');
      const sub = document.getElementById('hero-sub');
      if (testMode) {
        btn.textContent = '✕ Exit Test Mode';
        btn.classList.add('active');
        sub.textContent = 'Guess Fact or Myth — one wrong answer resets your progress.';
      } else {
        btn.textContent = '▶ Test Mode';
        btn.classList.remove('active');
        sub.textContent = 'Click each card to flip it and reveal the answer.';
      }
      buildCards([...currentOrder]);
    });
  </script>
</body>
</html>
